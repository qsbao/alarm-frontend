# MySQL Database Configuration
# Configure via application-mysql.properties or environment variables:
#   DB_URL=jdbc:mysql://localhost:3306/fabalarm
#   DB_USERNAME=root
#   DB_PASSWORD=
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fabalarm}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Disable H2 Console in MySQL mode
spring.h2.console.enabled=false
